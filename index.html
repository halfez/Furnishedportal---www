<style>
  :root {
    /* Fluent light — Mica warm */
    --bg: #F3F3F3;
    --bg-solid: #F9F9F9;
    --layer: #FBFBFB;
    --layer-alt: #FFFFFF;
    --subtle: #EDEDED;
    --stroke: rgba(0,0,0,0.0578);
    --stroke-strong: rgba(0,0,0,0.0924);
    --ink: #1A1A1A;
    --ink-soft: #424242;
    --ink-muted: #616161;
    --ink-disabled: #8C8C8C;
    --accent: #0067C0;
    --accent-hover: #005FB8;
    --accent-pressed: #0053A6;
    --accent-soft: #EDF4FB;
    --accent-ink: #003E92;
    --shadow-2: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-4: 0 2px 4px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.06);
    --shadow-8: 0 4px 8px rgba(0,0,0,0.04), 0 8px 16px rgba(0,0,0,0.08);
    --shadow-16: 0 8px 16px rgba(0,0,0,0.06), 0 16px 32px rgba(0,0,0,0.10);

    --radius-sm: 4px;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --ease: cubic-bezier(0.33, 0, 0.67, 1);
    --ease-out: cubic-bezier(0, 0, 0, 1);
  }

  [data-theme="blue"] { --accent: #0067C0; --accent-hover: #005FB8; --accent-pressed: #0053A6; --accent-soft: #EDF4FB; --accent-ink: #003E92; }
  [data-theme="teal"] { --accent: #038387; --accent-hover: #026E71; --accent-pressed: #015A5D; --accent-soft: #E3F3F3; --accent-ink: #014E50; }
  [data-theme="purple"] { --accent: #8764B8; --accent-hover: #744DA9; --accent-pressed: #5C3996; --accent-soft: #F0EBF7; --accent-ink: #432E6D; }

  [data-theme-mode="dark"] {
    --bg: #202020;
    --bg-solid: #202020;
    --layer: #2B2B2B;
    --layer-alt: #323232;
    --subtle: #2A2A2A;

    font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4286; /* Fluent body */
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "ss02";
    transition: background-color .3s var(--ease), color .3s var(--ease);

  /* Fluent type ramp */
  .t-caption { font-size: 12px; line-height: 16px; font-weight: 400; }
  .t-body { font-size: 14px; line-height: 20px; font-weight: 400; }
  .t-body-strong { font-size: 14px; line-height: 20px; font-weight: 600; }
  .t-subtitle { font-size: 20px; line-height: 28px; font-weight: 600; letter-spacing: -0.005em; }

  .t-display-lg { font-size: 92px; line-height: 104px; font-weight: 600; letter-spacing: -0.025em; }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .wrap { padding: 0 20px; } }

  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px 5px 8px;
    background: var(--layer);
    border: 1px solid var(--stroke);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    color: var(--ink-soft);
    box-shadow: var(--shadow-2);
  }
  .pill .dot {
    width: 6px; height: 6px; border-radius: 6px; background: var(--accent);
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    transition: background .1s var(--ease), border-color .1s var(--ease), transform .08s var(--ease);
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.98); }
  .btn-accent {
    background: var(--accent); color: white;
    border: 1px solid var(--accent);
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-accent:active { background: var(--accent-pressed); }
  .btn-secondary {
    background: var(--layer);
    color: var(--ink);
    border: 1px solid var(--stroke-strong);
    box-shadow: var(--shadow-2);
  }
  .btn-secondary:hover { background: var(--layer-alt); }
  .btn-subtle {
    background: transparent;
    color: var(--ink);
    padding: 6px 12px;
  }
  .btn-subtle:hover { background: var(--subtle); }

  .card {
    background: var(--layer);
    border: 1px solid var(--stroke);
    border-radius: var(--radius);
    box-shadow: var(--shadow-2);
  }

  /* Acrylic / mica overlay */
  .acrylic {
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    backdrop-filter: saturate(150%) blur(30px);
    -webkit-backdrop-filter: saturate(150%) blur(30px);
    border: 1px solid var(--stroke);
  }

  /* Section divider rule */
  hr.sep { border: 0; height: 1px; background: var(--stroke-strong); margin: 0; }

  input, textarea { font-family: inherit; }

  ::selection { background: var(--accent); color: white; }

  /* Scrollbar — Fluent style */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 6px;
    border: 3px solid transparent;
    background-clip: content-box;
  }
  body:hover ::-webkit-scrollbar-thumb { background: var(--ink-disabled); background-clip: content-box; border: 3px solid transparent; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .6s var(--ease-out), transform .6s var(--ease-out); }
  .reveal.in { opacity: 1; transform: none; }
</style>

// Fluent-style landing sections
const { useState: useStateS, useEffect: useEffectS, useRef: useRefS } = React;

function useReveal() {
  const ref = useRefS(null);
  useEffectS(() => {
    const el = ref.current;
    if (!el) { return; }
    // Always reveal on mount as a safety net — transition still plays.
    const reveal = () => el.classList.add('in');
    // If IntersectionObserver is unavailable, just reveal immediately.
    if (typeof IntersectionObserver === 'undefined') { reveal(); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { reveal(); io.disconnect(); } });
    }, { threshold: 0, rootMargin: '0px 0px -5% 0px' });
    io.observe(el);
    // Fallback: if still hidden after 400ms (observer quirks), force reveal.
    const t = setTimeout(reveal, 400);
    return () => { io.disconnect(); clearTimeout(t); };
  }, []);
  return ref;
}

function Reveal({ children, delay = 0 }) {
  const ref = useReveal();
  return <div ref={ref} className="reveal" style={{ transitionDelay: `${delay}ms` }}>{children}</div>;
}

// Fluent chatbot widget — Claude-powered
const { useState: useStateC, useRef: useRefC, useEffect: useEffectC } = React;

function Chatbot() {
  const [open, setOpen] = useStateC(false);
  const [messages, setMessages] = useStateC([
    { from: 'bot', text: "Hi — I'm the FurnishedPortal concierge. Ask me about pricing, features, setup, or how it compares to other tools." },
  ]);
  const [input, setInput] = useStateC('');
  const [loading, setLoading] = useStateC(false);
  const scrollRef = useRefC(null);

  useEffectC(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, open]);

  const suggestions = ["How much does it cost?", "How fast can I launch?", "Do I need to leave Furnished Finder?"];

  async function send(text) {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput('');
    const next = [...messages, { from: 'user', text: q }];
    setMessages(next);
    setLoading(true);

    const ctx = `You are the FurnishedPortal concierge on the FurnishedPortal landing page. FurnishedPortal is a SaaS for midterm rental hosts. Each host gets a branded website on their own domain, a client portal (applications, e-signed leases, rent payments), a live availability calendar, and an AI concierge trained on their FAQ.

Pricing: Self-serve is $499 setup + $49/mo ($470/yr annual, 20% off). Done-for-you is $1,499 setup + $89/mo ($854/yr). No contracts, cancel anytime.

Founder: Afshin, a midterm rental host himself, based in Austin TX. Built for his own properties first. FurnishedPortal complements Furnished Finder — hosts still use FF to find leads, then send applicants to their FurnishedPortal site to apply and sign.

Tone: warm, personal, confident. Short replies — 2 to 4 sentences max. If unknown, offer afshin@furnishedportal.com.`;

    try {
      const reply = await window.claude.complete({ messages: [{ role: 'user', content: ctx + "\n\n---\n\nUser asks: " + q }] });
      setMessages([...next, { from: 'bot', text: reply }]);
    } catch {
      setMessages([...next, { from: 'bot', text: "Sorry, I'm having trouble connecting. Reach Afshin at afshin@furnishedportal.com." }]);
    } finally {
      setLoading(false);
    }
  }

  return (
    <>
      {!open && (
        <button onClick={() => setOpen(true)} style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 50,
          width: 52, height: 52, borderRadius: 26,
          background: 'var(--accent)', color: 'white',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: 'var(--shadow-16)',
          border: '1px solid var(--accent-pressed)',
        }}><IconSparkle size={20} /></button>
      )}
      {open && (
        <div className="acrylic" style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 50,
          width: 380, maxWidth: 'calc(100vw - 40px)',
          height: 540, maxHeight: 'calc(100vh - 80px)',
          borderRadius: 12,
          boxShadow: 'var(--shadow-64)',
          display: 'flex', flexDirection: 'column',
          overflow: 'hidden',
        }}>
          <div style={{
            padding: '12px 14px', borderBottom: '1px solid var(--stroke)',
            display: 'flex', alignItems: 'center', gap: 10, background: 'color-mix(in srgb, var(--layer) 60%, transparent)',
          }}>
            <div style={{ width: 32, height: 32, borderRadius: 32, background: 'var(--accent)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><IconSparkle size={16} /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600 }}>FurnishedPortal concierge</div>
              <div style={{ fontSize: 11, color: 'var(--ink-muted)', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 6, height: 6, borderRadius: 6, background: '#6FB57A' }} /> Usually instant
              </div>
            </div>
            <button onClick={() => setOpen(false)} className="btn btn-subtle" style={{ padding: 6 }}><IconX size={16} /></button>
          </div>
          <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', padding: '14px 14px 6px' }}>
            {messages.map((m, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: m.from === 'bot' ? 'flex-start' : 'flex-end', marginBottom: 8 }}>
                <div style={{
                  maxWidth: '85%', padding: '9px 12px', borderRadius: 10,
                  borderTopLeftRadius: m.from === 'bot' ? 2 : 10,
                  borderTopRightRadius: m.from === 'bot' ? 10 : 2,
                  background: m.from === 'bot' ? 'var(--subtle)' : 'var(--accent)',
                  color: m.from === 'bot' ? 'var(--ink)' : 'white',
                  fontSize: 13, lineHeight: 1.5, whiteSpace: 'pre-wrap',
                }}>{m.text}</div>
              </div>
            ))}
            {loading && (
              <div style={{ display: 'flex', justifyContent: 'flex-start', marginBottom: 8 }}>
                <div style={{ padding: '10px 12px', borderRadius: 10, borderTopLeftRadius: 2, background: 'var(--subtle)', display: 'flex', gap: 4 }}>
                  <Dot d={0} /><Dot d={0.2} /><Dot d={0.4} />
                </div>
              </div>
            )}
          </div>
          {messages.length === 1 && !loading && (
            <div style={{ padding: '0 14px 8px', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {suggestions.map(s => (
                <button key={s} onClick={() => send(s)} className="btn btn-secondary" style={{ padding: '5px 10px', fontSize: 11, fontWeight: 500 }}>{s}</button>
              ))}
            </div>
          )}
          <form onSubmit={(e) => { e.preventDefault(); send(); }} style={{ padding: 12, borderTop: '1px solid var(--stroke)', display: 'flex', gap: 8, alignItems: 'center' }}>
            <input value={input} onChange={(e) => setInput(e.target.value)} placeholder="Ask about pricing, features, setup…" style={{
              flex: 1, padding: '8px 12px',
              border: '1px solid var(--stroke-strong)', borderRadius: 4,
              fontSize: 13, outline: 'none', background: 'var(--layer-alt)', color: 'var(--ink)',
            }} />
            <button type="submit" disabled={!input.trim() || loading} className="btn btn-accent" style={{ padding: 0, width: 32, height: 32, borderRadius: 4, opacity: input.trim() && !loading ? 1 : 0.5 }}><IconSend size={14} /></button>
          </form>
        </div>
      )}
      <style>{`@keyframes cbBounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }`}</style>
    </>
  );
}

function Dot({ d }) {
  return <span style={{ width: 6, height: 6, borderRadius: 6, background: 'var(--ink-muted)', display: 'inline-block', animation: 'cbBounce 1.2s infinite ease-in-out', animationDelay: `${d}s` }} />;
}

Object.assign(window, { Chatbot });

// Fluent tweaks panel
function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;

  const schemes = [

                display: 'flex', alignItems: 'center', gap: 8,
                padding: '8px 10px', borderRadius: 6,
                border: `1px solid ${state.colorScheme === s.id ? s.c : 'var(--stroke-strong)'}`,
                background: state.colorScheme === s.id ? 'var(--accent-soft)' : 'var(--layer)',

              }}>

                {s.label}

          </div>
        </Group>
        <Group label="Pricing cycle">
          <div style={{ display: 'flex', padding: 3, background: 'var(--subtle)', borderRadius: 99 }}>
            {['monthly','annual'].map(c => (
              <button key={c} onClick={() => setState({ pricingCycle: c })} style={{
                flex: 1, padding: '6px 10px', borderRadius: 99,
                fontSize: 11, fontWeight: 600,
                background: state.pricingCycle === c ? 'var(--accent)' : 'transparent',
                color: state.pricingCycle === c ? 'white' : 'var(--ink-soft)',
                textTransform: 'capitalize',
              }}>{c}</button>
            ))}
          </div>
        </Group>
        <Group label="Host site preview">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {hosts.map(h => (
              <button key={h.id} onClick={() => setState({ hostBrand: h.id })} style={{
                display: 'flex', alignItems: 'center', gap: 8,

/* ===== src/app.jsx ===== */
function App() {
  const [state, setState] = React.useState(window.TWEAK_DEFAULTS || { colorScheme: 'blue', themeMode: 'light', hostBrand: 'juniper', pricingCycle: 'monthly' });
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => {
    document.body.setAttribute('data-theme', state.colorScheme);
    document.body.setAttribute('data-theme-mode', state.themeMode);
  }, [state.colorScheme, state.themeMode]);

  React.useEffect(() => {
    function handler(e) {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function update(patch) {
    const next = { ...state, ...patch };
    setState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  }

  const hostBrand = HOST_BRANDS[state.hostBrand] || HOST_BRANDS.juniper;

  return (
    <>
      <AnnouncementBanner />
      <Nav />
      <Hero hostBrand={hostBrand} />
      <HowItWorks />
      <Features />
      <Pricing cycle={state.pricingCycle} onCycleChange={(c) => update({ pricingCycle: c })} />
      <FoundingCohort />
      <About />
      <FAQ />
      <FinalCTA />
      <Footer />
      <Chatbot />
      <TweaksPanel state={state} setState={update} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
